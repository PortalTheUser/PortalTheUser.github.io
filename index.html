<!DOCTYPE html>
<html lang="en-Us">
<head>
<meta charset="UTF-8">
<title>Korone's Panel</title>
<style>
  body {
    background: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    display: flex;
    gap: 20px;
  }

  .panel {
    background: linear-gradient(180deg, #2b2b2b, #1c1c1c);
    padding: 20px;
    border-radius: 10px;
    width: 260px;
    color: #fff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  .panel h2 {
    margin-bottom: 15px;
    font-size: 18px;
  }

  .btn {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.2s;
  }

  .btn.red {
    background: #e84142;
    color: #fff;
    font-weight: bold;
  }

  .btn.green {
    background: #2ecc71;
    color: #fff;
    font-weight: bold;
  }

  .btn.dark {
    background: #2a2a2a;
    color: #ddd;
    border: 1px solid #3a3a3a;
  }

  .btn.dark:hover {
    background: #333;
  }

  .btn.red:hover {
    background: #ff4c4c;
  }

  .btn.green:hover {
    background: #3df58a;
  }

  .input-box {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
    background: #222;
    color: #fff;
    border: 1px solid #444;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Account Actions -->
  <div class="panel">
    <h2>Account Actions</h2>

    <button class="btn red">Ban User</button>
    <button class="btn dark">Nullify Password</button>
    <button class="btn dark">Reset Sessions</button>
    <button class="btn dark">Lock Account</button>
    <button class="btn dark">Unverify User</button>
    <button class= "btn dark">Verify User</button>
  
  </div>

 <!-- Robux Manager -->
<div class="panel">
  <h2>Robux Manager</h2>

  <button class="btn green">Add</button>
  <button class="btn red">Remove</button>

  <input type="number" class="input-box" placeholder="Enter amount">

  <p style="margin-top: 15px; margin-bottom: 5px; font-size: 13px; color: #ccc;">
    UserID/Username
  </p>

  <input type="text" class="input-box" placeholder="Enter UserID or Username">
</div>
